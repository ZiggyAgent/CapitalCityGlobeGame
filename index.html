<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Capital City Quiz</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,-apple-system,sans-serif;background:#f5f5f0;color:#1a1a1a;display:flex;justify-content:center;padding:2rem 1rem}
#app{width:100%;max-width:520px}
#game{display:flex;flex-direction:column;align-items:center;padding:0.75rem 0;min-height:520px}
#score-bar{display:flex;gap:16px;align-items:center;font-size:13px;color:#666;margin-bottom:0.5rem}
#score-num{font-size:20px;font-weight:500;color:#1a1a1a}
#turn-dots{display:flex;gap:5px}
.dot{width:10px;height:10px;border-radius:50%;background:#ddd;transition:background 0.3s}
.dot.done-correct{background:#3a8c5a}.dot.done-wrong{background:#c44}.dot.active{background:#ffd700}
#globe-wrap{position:relative;width:220px;height:220px;margin:0.25rem auto}
#globe-canvas{border-radius:50%;display:block}
#question-area{text-align:center;margin:0.4rem 0 0.6rem;min-height:56px;display:flex;flex-direction:column;align-items:center;gap:4px}
#country-label{font-size:22px;font-weight:500;min-height:30px}
#points-badge{font-size:12px;padding:3px 10px;border-radius:20px;background:#f0f0ea;color:#666;border:0.5px solid #ddd;display:none}
#question-text{font-size:14px;color:#666}
#options{display:grid;grid-template-columns:1fr 1fr;gap:8px;width:100%;max-width:460px;margin:0 auto}
.opt-btn{padding:11px 14px;border:0.5px solid #ccc;border-radius:8px;background:#fff;color:#1a1a1a;font-size:14px;cursor:pointer;text-align:left;transition:background 0.15s;font-family:inherit}
.opt-btn:hover:not(:disabled){background:#f5f5f0}
.opt-btn.correct{background:#1a5c2a;color:#a8e6b8;border-color:#2d8a45}
.opt-btn.wrong{background:#5c1a1a;color:#e6a8a8;border-color:#8a2d2d}
.opt-btn:disabled{cursor:default}
#result-msg{font-size:14px;min-height:20px;font-weight:500;color:#666;margin-top:4px}
#action-btn{margin-top:0.6rem;padding:10px 28px;border:0.5px solid #ccc;border-radius:8px;background:#fff;color:#1a1a1a;font-size:14px;cursor:pointer;font-weight:500;font-family:inherit}
#action-btn:hover{background:#f5f5f0}
#end-screen{display:none;flex-direction:column;align-items:center;gap:10px;text-align:center;padding:0.5rem 0;width:100%;max-width:460px}
#final-score-big{font-size:56px;font-weight:500;line-height:1}
#end-breakdown{width:100%;border-collapse:collapse;font-size:13px}
#end-breakdown th{text-align:left;padding:5px 8px;border-bottom:0.5px solid #ddd;color:#666;font-weight:400}
#end-breakdown td{padding:5px 8px;border-bottom:0.5px solid #ddd}
.r-correct{color:#3a8c5a}.r-wrong{color:#c44}
#play-again{padding:10px 28px;border:0.5px solid #ccc;border-radius:8px;background:#fff;color:#1a1a1a;font-size:14px;cursor:pointer;font-weight:500;margin-top:6px;font-family:inherit}
#play-again:hover{background:#f5f5f0}
h1{text-align:center;font-size:22px;font-weight:500;margin-bottom:1rem;color:#1a1a1a}
@media(prefers-color-scheme:dark){
  body{background:#1a1a1a;color:#eee}
  #score-num,#country-label{color:#eee}
  #score-bar,#question-text,#result-msg{color:#aaa}
  #points-badge{background:#2a2a2a;color:#aaa;border-color:#444}
  .opt-btn{background:#2a2a2a;color:#eee;border-color:#444}
  .opt-btn:hover:not(:disabled){background:#333}
  #action-btn,#play-again{background:#2a2a2a;color:#eee;border-color:#444}
  #action-btn:hover,#play-again:hover{background:#333}
  .dot{background:#444}
  #end-breakdown th{border-color:#444;color:#aaa}
  #end-breakdown td{border-color:#444}
  h1{color:#eee}
}
</style>
</head>
<body>
<div id="app">
<h1>Capital City Quiz</h1>
<div id="game">
  <div id="score-bar">
    <div>Score: <span id="score-num">0</span></div>
    <div id="turn-dots"></div>
    <div>Turn <span id="turn-num">0</span>/10</div>
  </div>
  <div id="globe-wrap">
    <canvas id="globe-canvas" width="220" height="220"></canvas>
  </div>
  <div id="question-area">
    <div id="country-label"></div>
    <div id="points-badge"></div>
    <div id="question-text"></div>
  </div>
  <div id="options"></div>
  <div id="result-msg"></div>
  <button id="action-btn">Spin the Globe</button>
  <div id="end-screen">
    <div style="font-size:14px;color:#666">Game over! Final score:</div>
    <div id="final-score-big">0</div>
    <table id="end-breakdown">
      <thead><tr><th>Place</th><th>Capital</th><th>Points</th><th></th></tr></thead>
      <tbody id="breakdown-body"></tbody>
    </table>
    <button id="play-again">Play again</button>
  </div>
</div>
</div>

const tex=new THREE.CanvasTexture(texCanvas);
const geo=new THREE.SphereGeometry(1,64,64);
const mat=new THREE.MeshPhongMaterial({
  map:tex,specular:new THREE.Color(0x224488),shininess:18,

const globe=new THREE.Mesh(geo,mat);

const atmoGeo=new THREE.SphereGeometry(1.04,32,32);

scene.add(new THREE.Mesh(atmoGeo,atmoMat));

const ambient=new THREE.AmbientLight(0x334466,0.7);scene.add(ambient);
const sun=new THREE.DirectionalLight(0xffffff,1.1);sun.position.set(5,3,5);scene.add(sun);
const fill=new THREE.DirectionalLight(0x223355,0.3);fill.position.set(-3,-1,-3);scene.add(fill);

let spinSpeed=0,spinning=false,spinDone=null;

function animate(){
  requestAnimationFrame(animate);
  globe.rotation.y+=spinSpeed;
  if(spinning){
    spinSpeed*=0.985;
    if(spinSpeed<0.003){spinSpeed=0;spinning=false;if(spinDone){const cb=spinDone;spinDone=null;cb();}}
  }
  renderer.render(scene,camera);
}
animate();

function doSpin(cb){
  spinSpeed=0.14+Math.random()*0.06;spinning=true;spinDone=null;
  setTimeout(()=>{spinning=true;spinDone=cb;},1800);
}

const ALL=[...DATA.countries,...DATA.states];
const CAPITALS=ALL.map(x=>x[1]);
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}
function weightedPick(pool,used){
  const avail=pool.filter(x=>!used.has(x[0]));
  if(!avail.length)return pool[Math.floor(Math.random()*pool.length)];
  const tw=avail.reduce((s,x)=>s+x[2],0);let r=Math.random()*tw;
  for(const item of avail){r-=item[2];if(r<=0)return item;}
  return avail[avail.length-1];
}
function calcPoints(w){return Math.round(5+(10-w)*5)}
function getWrongOptions(correct,type){
  let pool;
  if(type==='state')pool=DATA.states.map(x=>x[1]).filter(c=>c!==correct);
  else pool=DATA.countries.map(x=>x[1]).filter(c=>c!==correct);
  shuffle(pool);
  const extra=CAPITALS.filter(c=>c!==correct&&!pool.includes(c));shuffle(extra);
  return shuffle([...pool.slice(0,8),...extra.slice(0,4)]).slice(0,3);
}

function showQuestion(item){
  currentItem=item;
  const pts=calcPoints(item[2]);
  countryLabelEl.textContent=item[0];
  pointsBadgeEl.style.display='inline-block';
  pointsBadgeEl.textContent=pts+' pts if correct';
  questionTextEl.textContent='What is the capital '+(item[3]==='state'?'of the US state of':'city of')+' '+item[0]+'?';
  const wrongs=getWrongOptions(item[1],item[3]);
  const opts=shuffle([item[1],...wrongs]);
  optionsDiv.innerHTML='';
  opts.forEach(o=>{
    const btn=document.createElement('button');btn.className='opt-btn';btn.textContent=o;
    btn.onclick=()=>answer(o,item[1],pts,btn);
    optionsDiv.appendChild(btn);
  });
  resultMsgEl.textContent='';answering=true;actionBtn.style.display='none';
}

function answer(chosen,correct,pts,btn){
  if(!answering)return;answering=false;
  document.querySelectorAll('.opt-btn').forEach(b=>{
    b.disabled=true;
    if(b.textContent===correct)b.className='opt-btn correct';
    else if(b===btn)b.className='opt-btn wrong';
  });
  const ok=(chosen===correct);
  if(ok){score+=pts;scoreNumEl.textContent=score;resultMsgEl.style.color='#3a8c5a';resultMsgEl.textContent='Correct! +'+pts+' points';}
  else{resultMsgEl.style.color='#c44';resultMsgEl.textContent='Wrong. The answer was '+correct+'.';}
  history.push({name:currentItem[0],capital:correct,pts:ok?pts:0,maxPts:pts,correct:ok});
  setDot(turn-1,ok?'done-correct':'done-wrong');
  actionBtn.textContent=turn>=10?'See Results':'Next Spin';
  actionBtn.style.display='inline-block';
}

function startTurn(){
  if(turn>=10){endGame();return;}
  turn++;turnNumEl.textContent=turn;setDot(turn-1,'active');
  actionBtn.style.display='none';
  countryLabelEl.textContent='';pointsBadgeEl.style.display='none';
  questionTextEl.textContent='Spinning...';optionsDiv.innerHTML='';resultMsgEl.textContent='';
  const combined=[...DATA.countries,...DATA.states];
  const item=weightedPick(combined,usedNames);usedNames.add(item[0]);
  doSpin(()=>showQuestion(item));
}

function endGame(){
  endScreen.style.display='flex';
  document.getElementById('final-score-big').textContent=score;
  const tbody=document.getElementById('breakdown-body');tbody.innerHTML='';
  history.forEach(h=>{
    const tr=document.createElement('tr');
    tr.innerHTML='<td>'+h.name+'</td><td>'+h.capital+'</td><td>'+h.maxPts+'</td><td class="'+(h.correct?'r-correct':'r-wrong')+'">'+(h.correct?'+'+h.pts:'✗')+'</td>';
    tbody.appendChild(tr);
  });
  document.querySelectorAll('#globe-wrap,#question-area,#options,#result-msg,#action-btn,#score-bar').forEach(el=>el.style.display='none');
}

function resetGame(){
  score=0;turn=0;history=[];usedNames=new Set();currentItem=null;answering=false;
  scoreNumEl.textContent='0';turnNumEl.textContent='0';initDots();
  endScreen.style.display='none';
  document.querySelectorAll('#globe-wrap,#question-area,#options,#result-msg,#action-btn,#score-bar').forEach(el=>el.style.display='');
  optionsDiv.innerHTML='';resultMsgEl.textContent='';countryLabelEl.textContent='';
  questionTextEl.textContent='';pointsBadgeEl.style.display='none';
  actionBtn.textContent='Spin the Globe';actionBtn.style.display='inline-block';
}

actionBtn.onclick=()=>{if(turn===0||turn<10)startTurn();else endGame();};
document.getElementById('play-again').onclick=resetGame;

})();
</script>
</body>
</html>
